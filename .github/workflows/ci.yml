name: CI

# Vérifie automatiquement chaque push / pull request : syntaxe des scripts
# et suite de tests de non-régression (Phase A/B). Aucune dépendance externe.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Vérifier la syntaxe des scripts
        run: |
          for f in js/*.js; do node --check "$f"; done
      - name: Lancer les tests de non-régression
        run: npm test
